name: slotsync_app
description: SlotSync - Premium healthcare appointment booking platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.4
  firebase_analytics: ^11.3.4
  firebase_crashlytics: ^4.1.4
  cloud_functions: ^5.1.4

  # State & Routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  file_picker: ^8.1.6

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  timeago: ^3.7.0
  speech_to_text: ^7.0.0
  logger: ^2.0.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.2
  firebase_auth_mocks: ^0.14.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app icon.png"

flutter:
  uses-material-design: true
  assets:
    - "assets/app icon.png"
    - assets/images/
